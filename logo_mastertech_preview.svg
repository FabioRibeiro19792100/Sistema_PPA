<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap');
    .wm { font-family: Space Grotesk, Arial, sans-serif; font-weight: 700; letter-spacing: 0.06em; font-size: 24px; }
    .lb { font-family: Arial, sans-serif; font-size: 10px; letter-spacing: 0.08em; fill: #9AA0A6; }
  </style>

  <!-- Light -->
  <rect x="20" y="20" width="220" height="60" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text class="wm" x="130" y="57" fill="#0A0A0A" text-anchor="middle">MASTERTECH</text>
  <text class="lb" x="130" y="96" text-anchor="middle">LIGHT</text>

  <!-- Dark -->
  <rect x="280" y="20" width="220" height="60" rx="6" fill="#0A0A0A"/>
  <text class="wm" x="390" y="57" fill="#FFFFFF" text-anchor="middle">MASTERTECH</text>
  <text class="lb" x="390" y="96" text-anchor="middle">DARK</text>
</svg>
