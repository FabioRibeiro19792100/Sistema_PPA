name: Backup PPA → Cloudflare R2

on:
  schedule:
    - cron: '0 3 * * *'  # Todo dia às 03h UTC (meia-noite em Brasília)
  workflow_dispatch:       # Permite rodar manualmente pelo GitHub

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Instalar cliente PostgreSQL
        run: sudo apt-get install -y postgresql-client

      - name: Gerar dump do banco Supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          DATE_TAG=$(date +%Y-%m-%d_%H-%M-%S)
          FILENAME="ppa_backup_${DATE_TAG}.sql.gz"
          echo "FILENAME=${FILENAME}" >> $GITHUB_ENV

          pg_dump "${DATABASE_URL}" \
            --no-owner \
            --no-acl \
            --format=plain \
            | gzip -9 > "/tmp/${FILENAME}"

          SIZE=$(du -sh "/tmp/${FILENAME}" | cut -f1)
          echo "✅ Dump gerado: ${FILENAME} (${SIZE})"

      - name: Instalar AWS CLI
        run: pip install awscli --quiet

      - name: Upload para Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3 cp "/tmp/${FILENAME}" \
            "s3://bucket-mastertech/backup-ppa/${FILENAME}" \
            --endpoint-url "https://ae16e49b7837faeee19e2ccb4bb717f8.r2.cloudflarestorage.com" \
            --region auto

          echo "✅ Backup enviado: backup-ppa/${FILENAME}"

      - name: Remover backups com mais de 30 dias
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          CUTOFF=$(date -d "-30 days" +%Y-%m-%d)

          aws s3 ls "s3://bucket-mastertech/backup-ppa/" \
            --endpoint-url "https://ae16e49b7837faeee19e2ccb4bb717f8.r2.cloudflarestorage.com" \
            --region auto \
            | awk '{print $4}' \
            | while read -r key; do
                FILE_DATE=$(echo "$key" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -1)
                if [[ -n "$FILE_DATE" && "$FILE_DATE" < "$CUTOFF" ]]; then
                  echo "🗑  Removendo: ${key}"
                  aws s3 rm "s3://bucket-mastertech/backup-ppa/${key}" \
                    --endpoint-url "https://ae16e49b7837faeee19e2ccb4bb717f8.r2.cloudflarestorage.com" \
                    --region auto
                fi
              done
