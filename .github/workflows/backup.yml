name: Backup PPA → Cloudflare R2

on:
  schedule:
    - cron: '0 3 * * *'  # Todo dia às 03h UTC (meia-noite em Brasília)
  workflow_dispatch:       # Permite rodar manualmente pelo GitHub

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_URL: https://lmyrjbzqkixxhaqhramj.supabase.co
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      R2_ENDPOINT: https://ae16e49b7837faeee19e2ccb4bb717f8.r2.cloudflarestorage.com
      R2_BUCKET: bucket-mastertech
      R2_PREFIX: backup-ppa

    steps:
      - name: Exportar tabelas via Supabase REST API
        run: |
          DATE_TAG=$(date +%Y-%m-%d_%H-%M-%S)
          BACKUP_DIR="/tmp/ppa_backup_${DATE_TAG}"
          mkdir -p "${BACKUP_DIR}"
          echo "DATE_TAG=${DATE_TAG}" >> $GITHUB_ENV

          TABLES=(
            inscricoes
            participantes
            pareceristas
            atribuicoes
            avaliacoes
            avaliacao_criterios
            eventos_auditoria
            configuracoes_sistema
            imports
            import_rows_raw
          )

          for TABLE in "${TABLES[@]}"; do
            echo "📥 Exportando: ${TABLE}"
            STATUS=$(curl -sf -o "${BACKUP_DIR}/${TABLE}.json" \
              -w "%{http_code}" \
              "${SUPABASE_URL}/rest/v1/${TABLE}?select=*" \
              -H "apikey: ${SUPABASE_ANON_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
              -H "Accept: application/json" \
              -H "Prefer: count=none")

            if [[ "$STATUS" == "200" ]]; then
              ROWS=$(python3 -c "import json,sys; print(len(json.load(open('${BACKUP_DIR}/${TABLE}.json'))))")
              echo "  ✅ ${TABLE}: ${ROWS} registros"
            else
              echo "  ⚠️  ${TABLE}: status HTTP ${STATUS}"
            fi
          done

          FILENAME="ppa_backup_${DATE_TAG}.tar.gz"
          tar -czf "/tmp/${FILENAME}" -C /tmp "ppa_backup_${DATE_TAG}"
          SIZE=$(du -sh "/tmp/${FILENAME}" | cut -f1)
          echo "FILENAME=${FILENAME}" >> $GITHUB_ENV
          echo "✅ Arquivo gerado: ${FILENAME} (${SIZE})"

      - name: Instalar AWS CLI
        run: pip install awscli --quiet

      - name: Upload para Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3 cp "/tmp/${FILENAME}" \
            "s3://${R2_BUCKET}/${R2_PREFIX}/${FILENAME}" \
            --endpoint-url "${R2_ENDPOINT}" \
            --region auto

          echo "✅ Backup enviado: ${R2_PREFIX}/${FILENAME}"

      - name: Remover backups com mais de 30 dias
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          CUTOFF=$(date -d "-30 days" +%Y-%m-%d)

          aws s3 ls "s3://${R2_BUCKET}/${R2_PREFIX}/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --region auto \
            | awk '{print $4}' \
            | while read -r key; do
                FILE_DATE=$(echo "$key" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -1)
                if [[ -n "$FILE_DATE" && "$FILE_DATE" < "$CUTOFF" ]]; then
                  echo "🗑  Removendo: ${key}"
                  aws s3 rm "s3://${R2_BUCKET}/${R2_PREFIX}/${key}" \
                    --endpoint-url "${R2_ENDPOINT}" \
                    --region auto
                fi
              done
